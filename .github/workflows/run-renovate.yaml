---
name: run renovate

on:
  workflow_call:
    inputs:
      runner:
        description: runner name
        type: string
        default: ubuntu-latest
        required: false
      configuration-file:
        description: path to config
        type: string
        default: .github/renovate.json5
        required: false
      dry-run:
        description: dry run
        type: string
        default: "null"
        required: false
      log-level:
        description: log-level
        type: string
        default: debug
        required: false
      token:
        description: pat, for app use github-app-id and key
        type: string
        required: false
    secrets:
      github-app-id:
        description: github app id
        required: false
      github-app-key:
        description: github app private key
        required: false

jobs:
  renovate:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      # https://github.com/marketplace/actions/harden-runner
      - name: harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # https://github.com/marketplace/actions/create-github-app-token
      - name: generate token
        id: generate-token
        if: ${{ !inputs.token }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.github-app-id }}
          private-key: ${{ secrets.github-app-key }}

      # https://github.com/marketplace/actions/checkout
      - name: checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ inputs.token || steps.generate-token.outputs.token }}

      # https://github.com/marketplace/actions/renovate-bot-github-action
      - name: renovate bot
        uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
        env:
          LOG_LEVEL: ${{ inputs.log-level }}
          RENOVATE_CONFIG_FILE: ${{ inputs.configuration-file }}
          RENOVATE_DRY_RUN: ${{ inputs.dry-run }}
          RENOVATE_TOKEN: ${{ inputs.token || steps.generate-token.outputs.token }}
